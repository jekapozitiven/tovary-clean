<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Каталог товаров — Товары</title>

<link rel="icon" href="../../favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="../../favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="../../apple-touch-icon.png">
<link rel="stylesheet" href="../../assets/portal.css">

<style>
  .wrap { max-width: 1500px; }

  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: clamp(18px, 3vw, 26px); margin-bottom: 16px;
  }
  .panel h2 { margin: 0 0 4px; font-size: 15px; font-weight: 700; }
  .panel .sub { margin: 0 0 18px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }

  label.f { display: block; margin-bottom: 14px; }
  label.f span { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }

  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%; font-family: var(--font); font-size: 14px; color: var(--text);
    background: #0e0e10; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--border-hover); }
  textarea { resize: vertical; line-height: 1.55; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    padding: 10px 18px; font-size: 14px; font-weight: 700; font-family: var(--font);
    color: #0a0a0b; background: var(--accent);
    border: none; border-radius: 999px; cursor: pointer; transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .9; }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn--ghost { color: var(--text); background: transparent; border: 1px solid var(--border); }
  .btn--sm { padding: 7px 13px; font-size: 13px; }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .toolbar .search { flex: 1; min-width: 220px; }
  .toolbar select, .toolbar input[type=text] { width: auto; }
  .muted { font-size: 12.5px; color: var(--text-faint); }

  .progress { height: 3px; background: #1e1e22; border-radius: 999px; overflow: hidden; margin-bottom: 12px; }
  .progress i { display: block; height: 100%; background: var(--accent); width: 0; transition: width .2s; }

  .cols { display: grid; grid-template-columns: minmax(0,1.1fr) minmax(0,1fr); gap: 16px; align-items: start; }
  @media (max-width: 1000px) { .cols { grid-template-columns: 1fr; } }

  .list { max-height: 72vh; overflow-y: auto; }

  .grp { border-bottom: 1px solid var(--border); }
  .grp:last-child { border-bottom: none; }
  .grp__head {
    display: flex; gap: 12px; align-items: center; width: 100%; text-align: left;
    padding: 12px; background: transparent; border: none; cursor: pointer;
    font-family: var(--font); color: var(--text);
  }
  .grp__head:hover { background: var(--panel-hover); }
  .grp__img { width: 44px; height: 44px; flex: none; border-radius: 6px; object-fit: cover;
              background: #17171a; border: 1px solid var(--border); }
  .grp__body { flex: 1; min-width: 0; }
  .grp__name { display: block; font-size: 13.5px; font-weight: 600;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .grp__meta { display: block; font-size: 12px; color: var(--text-faint); margin-top: 3px; }
  .grp__chev { color: var(--text-faint); font-size: 12px; flex: none; transition: transform .15s; }
  .grp.is-open .grp__chev { transform: rotate(90deg); }

  .grp__kids { display: none; padding: 0 12px 12px 12px; }
  .grp.is-open .grp__kids { display: block; }

  .store-block { margin-top: 10px; }
  .store-block__t {
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 6px;
  }
  .store-block__t b { color: var(--text-dim); }

  .kid {
    display: flex; gap: 8px; align-items: center; width: 100%;
    padding: 6px 10px; margin-bottom: 4px;
    background: #101013; border: 1px solid var(--border); border-radius: var(--radius-sm);
  }
  .kid:hover { border-color: var(--border-hover); }
  .kid.is-active { border-color: var(--accent); }
  .kid__open {
    display: flex; gap: 10px; align-items: center; flex: 1; min-width: 0;
    padding: 4px 0; background: transparent; border: none; text-align: left;
    cursor: pointer; font-family: var(--font); color: var(--text);
  }
  .kid__name { flex: 1; min-width: 0; font-size: 13px;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kid__price { font-size: 12.5px; color: var(--text-dim); white-space: nowrap; }
  .kid__sku { font-size: 11.5px; color: var(--text-faint); white-space: nowrap; }

  .dot-status { display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .dot-on  { background: var(--green); }
  .dot-off { background: #6b6b66; }

  .miss { font-size: 12.5px; color: var(--text-faint); padding: 6px 10px; }

  .ed__head { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 18px; }
  .ed__thumb { width: 64px; height: 64px; border-radius: 8px; object-fit: cover;
               background: #17171a; border: 1px solid var(--border); flex: none; }
  .ed__title { font-size: 15px; font-weight: 700; line-height: 1.35; }
  .ed__id { font-size: 12px; color: var(--text-faint); margin-top: 3px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } }

  .thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .thumbs img { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); }

  .bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 18px;
         padding-top: 16px; border-top: 1px solid var(--border); }

  .msg { padding: 11px 14px; border-radius: var(--radius-sm); font-size: 13px; line-height: 1.55; margin-top: 12px; }
  .msg--ok   { background: rgba(52,211,153,.08); border: 1px solid rgba(52,211,153,.25); color: #6ee7b7; }
  .msg--err  { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.25); color: #fca5a5; }
  .msg--warn { background: rgba(214,242,74,.06); border: 1px solid rgba(214,242,74,.2); color: var(--text-dim); }
  .msg pre { margin: 8px 0 0; white-space: pre-wrap; word-break: break-word; font-size: 12px; opacity: .85; }

  .empty { padding: 40px 20px; text-align: center; color: var(--text-faint); font-size: 13.5px; }
  .hidden { display: none !important; }

  .bulk {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    padding: 12px 14px; margin-bottom: 14px;
    background: rgba(214,242,74,.06); border: 1px solid rgba(214,242,74,.2);
    border-radius: var(--radius-sm);
  }
  .bulk__n { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .bulk input[type=text] { flex: 1; min-width: 200px; width: auto; }

  .kid__chk { width: 15px; height: 15px; flex: none; accent-color: var(--accent); cursor: pointer; }
  .kid__note {
    font-size: 11.5px; color: var(--accent); white-space: nowrap;
    max-width: 160px; overflow: hidden; text-overflow: ellipsis;
  }

  .raw {
    margin-top: 12px; padding: 12px; max-height: 320px; overflow: auto;
    background: #0e0e10; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 11.5px; line-height: 1.5; color: var(--text-dim);
    white-space: pre-wrap; word-break: break-word;
  }

  .flabel { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }

  /* Фото */
  .ph { display: flex; align-items: center; gap: 8px; padding: 6px;
        border: 1px solid var(--border); border-radius: var(--radius-sm);
        background: #101013; margin-bottom: 6px; }
  .ph__img { width: 44px; height: 44px; flex: none; border-radius: 5px; object-fit: cover;
             background: #17171a; border: 1px solid var(--border); }
  .ph__n { font-size: 11px; color: var(--text-faint); flex: none; width: 52px; }
  .ph__url { flex: 1; min-width: 0; font-size: 11.5px; color: var(--text-dim);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ph__b { flex: none; width: 28px; height: 28px; font-size: 13px; cursor: pointer;
           color: var(--text-dim); background: transparent;
           border: 1px solid var(--border); border-radius: 6px; }
  .ph__b:hover { color: var(--text); border-color: var(--border-hover); }
  .ph__b--del:hover { color: #fca5a5; border-color: rgba(248,113,113,.4); }
  .ph__empty { font-size: 12.5px; color: var(--text-faint); padding: 6px 0; }
  .ph__add { display: flex; gap: 8px; margin-top: 8px; }
  .ph__add input { flex: 1; }

  /* Скидка */
  .disc { padding: 12px 14px; margin-bottom: 14px; border-radius: var(--radius-sm);
          background: #101013; border: 1px solid var(--border); }
  .disc__t { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .disc__row { display: flex; gap: 8px; align-items: center; }
  .disc__row input { flex: 1; }
  .disc__row select { width: 70px; flex: none; }
  .disc__now { font-size: 12px; color: var(--green); margin-top: 8px; min-height: 15px; }

  /* Разновидности */
  .sibs { padding: 12px 14px; margin-bottom: 14px; border-radius: var(--radius-sm);
          background: rgba(214,242,74,.05); border: 1px solid rgba(214,242,74,.16); }
  .sibs__hint { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-top: 6px; }
  .sibs__list { font-size: 11.5px; color: var(--text-faint); line-height: 1.6; margin-top: 6px;
                max-height: 110px; overflow: auto; }
  .chk { display: flex; align-items: center; gap: 8px; font-size: 13.5px; margin-bottom: 7px; cursor: pointer; }
  .chk input { width: 16px; height: 16px; accent-color: var(--accent); }
  .spread { margin-top: 16px; padding: 14px; border-radius: var(--radius-sm);
            background: rgba(214,242,74,.05); border: 1px solid rgba(214,242,74,.16); }
  .spread .t { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .spread .d { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand__name">ТОВАРЫ<span class="slash">//</span></div>
    <div class="brand__sub">Каталог товаров</div>
  </div>
  <a class="home-btn" href="../../index.html"><span class="home-btn__arrow">←</span> Главная</a>
</header>

<main class="wrap">

  <div class="panel" id="setup">
    <h2>Подключение</h2>
    <p class="sub">Адрес посредника и пароль приложения. Вводится один раз. Токены Prom сюда не вводятся — они в посреднике.</p>
    <div class="grid2">
      <label class="f"><span>Адрес посредника</span>
        <input type="text" id="cfg-url" placeholder="https://…workers.dev"></label>
      <label class="f"><span>Пароль приложения</span>
        <input type="password" id="cfg-pass" placeholder="секрет APP_PASSWORD"></label>
    </div>
    <div class="bar" style="border:none; padding-top:0; margin-top:0;">
      <button class="btn" id="cfg-save">Проверить и сохранить</button>
      <button class="btn btn--ghost btn--sm hidden" id="cfg-hide">Свернуть</button>
    </div>
    <div id="cfg-msg"></div>
  </div>

  <div id="work" class="hidden">

    <div class="toolbar">
      <button class="btn btn--sm" id="load">Загрузить все магазины</button>
      <input type="text" class="search" id="search" placeholder="Артикул или название — ищет во всех магазинах…">
      <select id="fstatus"><option value="">Все статусы</option></select>
      <select id="fnote">
        <option value="">Заметки: любые</option>
        <option value="has">Только с заметкой</option>
        <option value="no">Только без заметки</option>
      </select>
      <button class="btn btn--ghost btn--sm" id="cfg-open">Настройки</button>
    </div>

    <div class="bulk hidden" id="bulk">
      <span class="bulk__n" id="bulk-n">выбрано 0</span>
      <input type="text" id="bulk-note" placeholder="Например: Скрыл до 25 числа">
      <button class="btn btn--sm" id="bulk-apply">Записать заметку всем</button>
      <button class="btn btn--ghost btn--sm" id="bulk-clear-note">Стереть заметку</button>
      <button class="btn btn--ghost btn--sm" id="bulk-none">Снять выделение</button>
    </div>

    <div class="progress hidden" id="prog"><i></i></div>
    <div id="stats"></div>

    <div class="cols">
      <div class="panel" style="padding:6px;">
        <div class="list" id="list">
          <div class="empty">Нажмите «Загрузить все магазины»</div>
        </div>
      </div>
      <div class="panel" id="editor">
        <div class="empty">Выберите позицию слева</div>
      </div>
    </div>
  </div>

</main>

<script>
/* ===================================================================== */
/*  Настройки и заметки                                                   */
/* ===================================================================== */
const CFG_KEY  = 'tovary:catalog:cfg';
const NOTE_KEY = 'tovary:catalog:notes';
const loadJSON = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
const saveJSON = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

let cfg   = loadJSON(CFG_KEY, { url: '', pass: '' });
let notes = loadJSON(NOTE_KEY, {});

/* Black Street — главный, без суффикса */
const STORES = {
  blackstreet: { title: 'Black Street', suffix: ''     },
  bonna:       { title: 'Bonna-shop',   suffix: ' (B)' },
  core22:      { title: 'Core22',       suffix: ' (С)' },
};
const STORE_KEYS = Object.keys(STORES);

const STATUS_RU = {
  on_display: 'опубликован',
  not_on_display: 'не показывается',
  draft: 'черновик',
  deleted: 'удалён',
  approved: 'одобрен',
  editing_required: 'требует правки',
  waiting_for_moderation: 'на модерации',
};

let byStore = {};      // магазин -> массив товаров
let groups  = [];      // группы по артикулу
let shown   = [];      // отфильтрованные
let current = null;    // { store, product }
let openBase = null;   // какая группа раскрыта
let picked = new Set();// выделенные позиции для массовых заметок
let lastResponse = null; // последний ответ Prom — для разбора

const $ = (id) => document.getElementById(id);

/* ===================================================================== */
/*  Связь с посредником                                                   */
/* ===================================================================== */
async function api(route, payload) {
  if (!cfg.url) throw new Error('Не задан адрес посредника');
  const res = await fetch(cfg.url.replace(/\/+$/, '') + route, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-App-Password': cfg.pass },
    body: JSON.stringify(payload || {}),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const d = data.detail ? '\n' + JSON.stringify(data.detail, null, 2) : '';
    throw new Error((data.error || ('Ошибка ' + res.status)) + d);
  }
  return data;
}

/* ===================================================================== */
/*  Настройка                                                             */
/* ===================================================================== */
$('cfg-url').value  = cfg.url;
$('cfg-pass').value = cfg.pass;
const showMsg = (el, kind, html) => { el.innerHTML = '<div class="msg msg--' + kind + '">' + html + '</div>'; };

$('cfg-save').addEventListener('click', async () => {
  cfg.url = $('cfg-url').value.trim();
  cfg.pass = $('cfg-pass').value;
  showMsg($('cfg-msg'), 'warn', 'Проверяю связь…');
  try {
    await api('/ping', {});
    saveJSON(CFG_KEY, cfg);
    showMsg($('cfg-msg'), 'ok', 'Связь есть, настройки сохранены.');
    $('work').classList.remove('hidden');
    $('cfg-hide').classList.remove('hidden');
    setTimeout(() => $('setup').classList.add('hidden'), 700);
  } catch (e) {
    showMsg($('cfg-msg'), 'err', 'Не получилось.<pre>' + escapeHtml(e.message) + '</pre>');
  }
});
$('cfg-open').addEventListener('click', () => {
  $('setup').classList.remove('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' });
});
$('cfg-hide').addEventListener('click', () => $('setup').classList.add('hidden'));

if (cfg.url && cfg.pass) {
  $('setup').classList.add('hidden');
  $('cfg-hide').classList.remove('hidden');
  $('work').classList.remove('hidden');
}

/* ===================================================================== */
/*  Загрузка всех магазинов                                               */
/* ===================================================================== */
$('load').addEventListener('click', loadAll);

async function loadStore(store, onProgress) {
  const out = [], seen = new Set();
  let lastId = null, guard = 0;
  while (guard++ < 3000) {
    const data = await api('/list', { store: store, limit: 100, last_id: lastId });
    const batch = data.products || [];
    if (!batch.length) break;
    let added = 0;
    for (const p of batch) {
      if (seen.has(p.id)) continue;
      seen.add(p.id); out.push(p); added++;
    }
    const next = batch[batch.length - 1].id;
    if (next === lastId) break;
    lastId = next;
    onProgress(out.length);
    if (added === 0 && batch.length < 100) break;
  }
  return out;
}

async function loadAll() {
  const btn = $('load'), prog = $('prog');
  btn.disabled = true;
  prog.classList.remove('hidden');
  prog.firstElementChild.style.width = '2%';
  byStore = {};

  try {
    let done = 0;
    for (const key of STORE_KEYS) {
      byStore[key] = await loadStore(key, (n) => {
        $('stats').innerHTML =
          '<div class="msg msg--warn">Загружаю ' + STORES[key].title + '… <b>' + n + '</b></div>';
      });
      done++;
      prog.firstElementChild.style.width = (done / STORE_KEYS.length * 100) + '%';
    }
    buildGroups();
    showStats();
    applyFilter();
  } catch (e) {
    $('stats').innerHTML = '<div class="msg msg--err">Не удалось загрузить.<pre>' +
      escapeHtml(e.message) + '</pre></div>';
  } finally {
    btn.disabled = false;
    setTimeout(() => prog.classList.add('hidden'), 600);
  }
}

/* ===================================================================== */
/*  Группировка по артикулу                                               */
/* ===================================================================== */
function baseSku(sku, store) {
  let s = (sku || '').trim();
  const suf = (STORES[store].suffix || '').trim();
  if (suf && s.endsWith(suf)) s = s.slice(0, -suf.length).trim();
  return s;
}

function firstImage(p) {
  if (Array.isArray(p.images) && p.images.length) {
    return p.images[0].thumbnail_url || p.images[0].url || '';
  }
  return p.main_image || '';
}
const isVisible = (p) => (p.status || '') === 'on_display';

function buildGroups() {
  // указатель id -> товар по каждому магазину
  const byId = {};
  for (const store of STORE_KEYS) {
    byId[store] = new Map();
    for (const p of (byStore[store] || [])) byId[store].set(String(p.id), p);
  }

  // ключ группы внутри магазина: сначала variation_group_id, потом артикул
  function localKey(p, store) {
    if (p.variation_group_id != null) return 'v' + p.variation_group_id;
    const s = baseSku(p.sku, store);
    return s ? ('s' + s) : ('p' + p.id);
  }

  // артикул Black Street -> ключ его карточки (для запасной связи)
  const skuToKey = new Map();
  for (const p of (byStore.blackstreet || [])) {
    const s = baseSku(p.sku, 'blackstreet');
    if (s && !skuToKey.has(s)) skuToKey.set(s, localKey(p, 'blackstreet'));
  }

  // общий ключ по всем магазинам: приводим к товару Black Street
  function globalKey(p, store) {
    if (store === 'blackstreet') return localKey(p, store);

    // 1) точно: external_id указывает на товар Black Street
    const ext = p.external_id != null ? String(p.external_id) : '';
    if (ext) {
      const src = byId.blackstreet.get(ext);
      if (src) return localKey(src, 'blackstreet');
    }
    // 2) запасной путь: тот же артикул есть на Black Street
    const s = baseSku(p.sku, store);
    if (s && skuToKey.has(s)) return skuToKey.get(s);

    // 3) совсем нет пары — своя карточка
    return s ? ('s' + s) : localKey(p, store);
  }

  const map = new Map();
  for (const store of STORE_KEYS) {
    for (const p of (byStore[store] || [])) {
      const key = globalKey(p, store);
      if (!map.has(key)) map.set(key, { base: '', key: key, stores: {}, linked: false });
      const g = map.get(key);
      if (!g.stores[store]) g.stores[store] = [];
      g.stores[store].push(p);
      if (store !== 'blackstreet' && p.external_id && byId.blackstreet.get(String(p.external_id))) {
        g.linked = true;                              // связь нашлась по external_id
      }
    }
  }

  groups = Array.from(map.values());

  for (const g of groups) {
    let best = null, img = '', sku = '';
    for (const store of STORE_KEYS) {
      const arr = g.stores[store];
      if (!arr) continue;
      arr.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      for (const p of arr) {
        const n = p.name || '';
        if (best === null || n.length < best.length) best = n;
        if (!img) img = firstImage(p);
        if (!sku && store === 'blackstreet') sku = baseSku(p.sku, store);
        if (!sku) sku = baseSku(p.sku, store);
      }
    }
    g.name = best || '(без названия)';
    g.base = sku || g.key;
    g.image = img;
  }
  groups.sort((a, b) => a.name.localeCompare(b.name));
}

/* ===================================================================== */
/*  Статистика и фильтр                                                   */
/* ===================================================================== */
function showStats() {
  const parts = STORE_KEYS.map(function (k) {
    const arr = byStore[k] || [];
    const on = arr.filter(isVisible).length;
    return STORES[k].title + ': <b>' + arr.length + '</b> (виден ' + on + ')';
  });

  // сколько товаров приёмников связаны с Black Street точно (по external_id)
  const srcIds = new Set((byStore.blackstreet || []).map(p => String(p.id)));
  const linkInfo = ['bonna', 'core22'].map(function (k) {
    const arr = byStore[k] || [];
    if (!arr.length) return null;
    const ok = arr.filter(p => p.external_id != null && srcIds.has(String(p.external_id))).length;
    return STORES[k].title + ': <b>' + ok + '</b> из ' + arr.length;
  }).filter(Boolean);

  $('stats').innerHTML =
    '<div class="msg msg--warn">' + parts.join(' · ') +
    '<br>Карточек всего: <b>' + groups.length + '</b>' +
    (linkInfo.length ? '<br>Связано с Black Street точно — ' + linkInfo.join(' · ') : '') +
    '</div>';

  const by = {};
  for (const k of STORE_KEYS) {
    for (const p of (byStore[k] || [])) {
      const s = p.status || 'без статуса';
      by[s] = (by[s] || 0) + 1;
    }
  }
  const sel = $('fstatus'), prev = sel.value;
  sel.innerHTML = '<option value="">Все статусы</option>' +
    Object.entries(by).sort((a, b) => b[1] - a[1])
      .map(([k, v]) => '<option value="' + escapeAttr(k) + '">' +
        (STATUS_RU[k] || k) + ' (' + v + ')</option>').join('');
  sel.value = Array.from(sel.options).some(o => o.value === prev) ? prev : '';
}

function debounce(fn, ms) {
  let t;
  return function () { clearTimeout(t); t = setTimeout(fn, ms); };
}
$('search').addEventListener('input', debounce(applyFilter, 250));
$('fstatus').addEventListener('change', applyFilter);
$('fnote').addEventListener('change', applyFilter);

function applyFilter() {
  const q = $('search').value.trim().toLowerCase();
  const st = $('fstatus').value;
  const fn = $('fnote').value;

  shown = groups.filter(function (g) {
    if (st) {
      const any = STORE_KEYS.some(k =>
        (g.stores[k] || []).some(p => (p.status || 'без статуса') === st));
      if (!any) return false;
    }
    if (fn) {
      const has = STORE_KEYS.some(k =>
        (g.stores[k] || []).some(p => !!notes[k + ':' + p.id]));
      if (fn === 'has' && !has) return false;
      if (fn === 'no'  &&  has) return false;
    }
    if (!q) return true;
    if (g.base.toLowerCase().indexOf(q) !== -1) return true;
    if (g.name.toLowerCase().indexOf(q) !== -1) return true;
    // ищем и по тексту заметки
    const inNote = STORE_KEYS.some(k => (g.stores[k] || []).some(p =>
      (notes[k + ':' + p.id] || '').toLowerCase().indexOf(q) !== -1));
    if (inNote) return true;
    return STORE_KEYS.some(k => (g.stores[k] || []).some(p =>
      (p.sku || '').toLowerCase().indexOf(q) !== -1 ||
      (p.name || '').toLowerCase().indexOf(q) !== -1));
  });
  renderList();
}

/* ===================================================================== */
/*  Список групп                                                          */
/* ===================================================================== */
function renderList() {
  const box = $('list');
  if (!groups.length) {
    box.innerHTML = '<div class="empty">Нажмите «Загрузить все магазины»</div>'; return;
  }
  if (!shown.length) {
    box.innerHTML = '<div class="empty">Ничего не найдено</div>'; return;
  }

  const slice = shown.slice(0, 200);

  box.innerHTML = slice.map(function (g, gi) {
    const counts = STORE_KEYS.map(function (k) {
      const n = (g.stores[k] || []).length;
      return n ? (STORES[k].title + ': ' + n) : null;
    }).filter(Boolean).join(' · ');

    const kids = STORE_KEYS.map(function (k) {
      const arr = g.stores[k] || [];
      if (!arr.length) {
        return '<div class="store-block">' +
          '<div class="store-block__t"><b>' + STORES[k].title + '</b></div>' +
          '<div class="miss">— нет такого артикула</div></div>';
      }
      const rows = arr.map(function (p, pi) {
        const active = (current && current.store === k && current.product.id === p.id) ? ' is-active' : '';
        const nk = k + ':' + p.id;
        const note = notes[nk];
        return '<div class="kid' + active + '">' +
          '<input type="checkbox" class="kid__chk" data-nk="' + escapeAttr(nk) + '"' +
            (picked.has(nk) ? ' checked' : '') + '>' +
          '<button class="kid__open" data-g="' + gi + '" data-s="' + k + '" data-i="' + pi + '">' +
            '<span class="dot-status ' + (isVisible(p) ? 'dot-on' : 'dot-off') + '"></span>' +
            '<span class="kid__name">' + escapeHtml(p.name || 'без названия') + '</span>' +
            (note ? '<span class="kid__note">📝 ' + escapeHtml(note) + '</span>' : '') +
            '<span class="kid__sku">' + escapeHtml(p.sku || '—') + '</span>' +
            '<span class="kid__price">' + (p.price != null ? escapeHtml(String(p.price)) : '') + '</span>' +
          '</button>' +
        '</div>';
      }).join('');
      return '<div class="store-block">' +
        '<div class="store-block__t"><b>' + STORES[k].title + '</b> — ' + arr.length + ' шт.</div>' +
        rows + '</div>';
    }).join('');

    const img = g.image
      ? '<img class="grp__img" src="' + escapeAttr(g.image) + '" loading="lazy" alt="">'
      : '<span class="grp__img"></span>';

    return '<div class="grp' + (openBase === g.base ? ' is-open' : '') + '">' +
      '<button class="grp__head" data-g="' + gi + '">' + img +
        '<span class="grp__body">' +
          '<span class="grp__name">' + escapeHtml(g.name) + '</span>' +
          '<span class="grp__meta">' + escapeHtml(g.base) + ' · ' + (counts || 'нет позиций') + '</span>' +
        '</span>' +
        '<span class="grp__chev">▶</span>' +
      '</button>' +
      '<div class="grp__kids">' + kids + '</div>' +
    '</div>';
  }).join('') + (shown.length > 200
    ? '<div class="empty">Показано 200 из ' + shown.length + '. Уточните поиск.</div>' : '');

  Array.from(box.querySelectorAll('.grp__head')).forEach(function (el) {
    el.addEventListener('click', function () {
      const g = slice[Number(el.dataset.g)];
      openBase = (openBase === g.base) ? null : g.base;
      renderList();
    });
  });
  Array.from(box.querySelectorAll('.kid__open')).forEach(function (el) {
    el.addEventListener('click', function () {
      const g = slice[Number(el.dataset.g)];
      const store = el.dataset.s;
      current = { store: store, product: g.stores[store][Number(el.dataset.i)] };
      renderList(); renderEditor();
    });
  });
  Array.from(box.querySelectorAll('.kid__chk')).forEach(function (el) {
    el.addEventListener('change', function () {
      const nk = el.dataset.nk;
      if (el.checked) picked.add(nk); else picked.delete(nk);
      updateBulk();
    });
  });
}

/* Все разновидности того же товара в том же магазине (кроме самого) */
function siblingsOf(store, p) {
  const arr = byStore[store] || [];
  if (p.variation_group_id != null) {
    return arr.filter(x => x.id !== p.id && x.variation_group_id === p.variation_group_id);
  }
  const base = baseSku(p.sku, store);
  if (!base) return [];
  return arr.filter(x => x.id !== p.id && baseSku(x.sku, store) === base);
}

/* Показ итоговой цены со скидкой */
function updateDiscHint() {
  const el = $('disc-now');
  if (!el) return;
  const price = Number($('e-price').value);
  const val = $('e-disc').value.trim();
  if (!val || !price) { el.textContent = ''; return; }
  const n = Number(val);
  const type = $('e-disc-type').value;
  const final = type === 'percent' ? price * (1 - n / 100) : price - n;
  el.textContent = 'Покупатель увидит: ' + Math.max(0, Math.round(final * 100) / 100) +
                   ' (было ' + price + ')';
}

/* --- Управление фото ------------------------------------------------- */
let editImages = [];

function renderPhotos() {
  const box = $('photos');
  if (!box) return;
  const rows = editImages.map(function (url, i) {
    return '<div class="ph">' +
      '<img class="ph__img" src="' + escapeAttr(url) + '" alt="" loading="lazy">' +
      '<span class="ph__n">' + (i === 0 ? 'главное' : (i + 1)) + '</span>' +
      '<span class="ph__url">' + escapeHtml(url) + '</span>' +
      '<button class="ph__b" data-act="up" data-i="' + i + '" title="Выше">↑</button>' +
      '<button class="ph__b" data-act="down" data-i="' + i + '" title="Ниже">↓</button>' +
      '<button class="ph__b ph__b--del" data-act="del" data-i="' + i + '" title="Удалить">✕</button>' +
    '</div>';
  }).join('');

  box.innerHTML =
    (rows || '<div class="ph__empty">Фото нет</div>') +
    '<div class="ph__add">' +
      '<input type="text" id="ph-new" placeholder="Ссылка на фото — https://…">' +
      '<button class="btn btn--ghost btn--sm" id="ph-add">Добавить</button>' +
    '</div>';

  Array.from(box.querySelectorAll('.ph__b')).forEach(function (b) {
    b.addEventListener('click', function () {
      const i = Number(b.dataset.i), act = b.dataset.act;
      if (act === 'del') editImages.splice(i, 1);
      if (act === 'up' && i > 0) {
        const t = editImages[i - 1]; editImages[i - 1] = editImages[i]; editImages[i] = t;
      }
      if (act === 'down' && i < editImages.length - 1) {
        const t = editImages[i + 1]; editImages[i + 1] = editImages[i]; editImages[i] = t;
      }
      renderPhotos();
    });
  });
  $('ph-add').addEventListener('click', function () {
    const v = $('ph-new').value.trim();
    if (!v) return;
    if (!/^https?:\/\//i.test(v)) { alert('Ссылка должна начинаться с http:// или https://'); return; }
    editImages.push(v);
    renderPhotos();
  });
}

/* ---- Сохранение ------------------------------------------------------ */
async function saveProduct() {
  const store = current.store, p = current.product;
  const box = $('ed-msg'), btn = $('save');

  const noteKey = store + ':' + p.id;
  const nv = $('e-note').value;
  if (nv) notes[noteKey] = nv; else delete notes[noteKey];
  saveJSON(NOTE_KEY, notes);

  const upd = { id: p.id };
  const changes = [];

  const price = $('e-price').value.trim();
  if (price !== '' && Number(price) !== Number(p.price)) { upd.price = Number(price); changes.push('цена'); }
  const sku = $('e-sku').value.trim();
  if (sku !== (p.sku || '')) { upd.sku = sku; changes.push('артикул'); }
  const presence = $('e-presence').value;
  if (presence !== p.presence) { upd.presence = presence; changes.push('наличие'); }
  const status = $('e-status').value;
  if (status !== (p.status || '')) { upd.status = status; changes.push('видимость'); }

  // название и описание — с учётом двух языков
  const nmlOld = p.name_multilang || null;
  const dmlOld = p.description_multilang || null;

  const nameRuNew = $('e-name').value.trim();
  const nameUkEl = document.getElementById('e-name-uk');
  const nameUkNew = nameUkEl ? nameUkEl.value.trim() : null;
  const nameRuOld = nmlOld && nmlOld.ru != null ? nmlOld.ru : (p.name || '');
  const nameUkOld = nmlOld && nmlOld.uk != null ? nmlOld.uk : null;

  if (nameRuNew !== nameRuOld || (nameUkNew !== null && nameUkNew !== nameUkOld)) {
    upd.name = nameRuNew;
    if (nmlOld) {
      upd.name_multilang = { ru: nameRuNew };
      if (nameUkNew !== null) upd.name_multilang.uk = nameUkNew;
    }
    changes.push('название');
  }

  const descRuNew = $('e-desc').value;
  const descUkEl = document.getElementById('e-desc-uk');
  const descUkNew = descUkEl ? descUkEl.value : null;
  const descRuOld = dmlOld && dmlOld.ru != null ? dmlOld.ru : (p.description || '');
  const descUkOld = dmlOld && dmlOld.uk != null ? dmlOld.uk : null;

  if (descRuNew !== descRuOld || (descUkNew !== null && descUkNew !== descUkOld)) {
    upd.description = descRuNew;
    if (dmlOld) {
      upd.description_multilang = { ru: descRuNew };
      if (descUkNew !== null) upd.description_multilang.uk = descUkNew;
    }
    changes.push('описание');
  }

  // ключевые слова
  const kmlOld = p.keywords_multilang || null;
  const kwRuNew = $('e-kw').value.trim();
  const kwUkEl = document.getElementById('e-kw-uk');
  const kwUkNew = kwUkEl ? kwUkEl.value.trim() : null;
  const kwRuOld = kmlOld && kmlOld.ru != null ? kmlOld.ru : (p.keywords || '');
  const kwUkOld = kmlOld && kmlOld.uk != null ? kmlOld.uk : null;

  if (kwRuNew !== kwRuOld || (kwUkNew !== null && kwUkNew !== kwUkOld)) {
    upd.keywords = kwRuNew;
    if (kwUkNew !== null && kwUkNew !== '') {
      upd.keywords_multilang = { ru: kwRuNew, uk: kwUkNew };
    }
    changes.push('ключевые слова');
  }

  // скидка
  const dRaw = $('e-disc').value.trim();
  const dType = $('e-disc-type').value;
  const dOld = p.discount || null;
  const dOldVal = dOld ? (dOld.value != null ? dOld.value : dOld.amount) : null;
  const dOldType = dOld && (dOld.type === 'percent' || dOld.type === '%') ? 'percent' : 'amount';
  if (dRaw === '') {
    if (dOldVal != null) { upd.discount = null; changes.push('скидка убрана'); }
  } else if (Number(dRaw) !== Number(dOldVal) || dType !== dOldType) {
    upd.discount = { value: Number(dRaw), type: dType };
    changes.push('скидка');
  }

  // фото — из списка редактора
  const nowImgs = (Array.isArray(p.images) ? p.images : [])
    .map(i => i.url || i.thumbnail_url || '').filter(Boolean);
  if (editImages.join('|') !== nowImgs.join('|')) {
    upd.images_urls = editImages.slice();
    changes.push('фото');
  }

  if (!changes.length) { showMsg(box, 'warn', 'Изменений нет. Заметка сохранена.'); return; }

  const applySibs = document.getElementById('apply-sibs');
  const spreadToSibs = !!(applySibs && applySibs.checked);
  const origName = p.name || '';   // запоминаем до изменения
  const origNameUk = (p.name_multilang && p.name_multilang.uk) || '';

  btn.disabled = true;
  showMsg(box, 'warn', 'Отправляю на Prom…');
  const report = [];

  try {
    const res = await api('/edit', { store: store, products: [upd] });

    // Prom отвечает 200, даже если товар не принят — смотрим, что внутри
    const okIds = (res && (res.processed_ids || res.processed || [])) || [];
    const errs  = (res && res.errors) || null;
    const wasOk = Array.isArray(okIds) && okIds.map(String).indexOf(String(p.id)) !== -1;

    if (errs && Object.keys(errs).length) {
      lastResponse = res;
      showMsg(box, 'err',
        'Prom вернул ошибку по товару.<pre>' + escapeHtml(JSON.stringify(errs, null, 2)) + '</pre>');
      btn.disabled = false;
      return;
    }
    if (!wasOk && Array.isArray(okIds)) {
      lastResponse = res;
      showMsg(box, 'err',
        'Prom не подтвердил изменение. Его полный ответ:<pre>' +
        escapeHtml(JSON.stringify(res, null, 2)) + '</pre>' +
        'Отправляли:<pre>' + escapeHtml(JSON.stringify(upd, null, 2)) + '</pre>');
      btn.disabled = false;
      return;
    }

    lastResponse = res;
    report.push(STORES[store].title + ': принято (' + changes.join(', ') + ')');
    Object.assign(p, upd);

    // все изменения на разновидности этого же магазина
    if (spreadToSibs) {
      const sibs = siblingsOf(store, p);
      const batch = sibs.map(function (s) {
        const o = { id: s.id };
        if ('price' in upd)       o.price = upd.price;
        if ('discount' in upd)    o.discount = upd.discount;
        if ('presence' in upd)    o.presence = upd.presence;
        if ('status' in upd)      o.status = upd.status;
        if ('description' in upd) o.description = upd.description;
        if ('images_urls' in upd) o.images_urls = upd.images_urls;
        if ('sku' in upd)         o.sku = upd.sku;   // у разновидностей артикул общий
        if ('name' in upd) {
          // сохраняем хвост с размером: «Костюм M» -> «Новый костюм M»
          const sn = s.name || '';
          const tail = (origName && sn.indexOf(origName) === 0) ? sn.slice(origName.length) : '';
          o.name = upd.name + tail;
          if (upd.name_multilang) {
            o.name_multilang = {};
            if (upd.name_multilang.ru != null) o.name_multilang.ru = upd.name_multilang.ru + tail;
            if (upd.name_multilang.uk != null) {
              const su = (s.name_multilang && s.name_multilang.uk) || '';
              const tu = (origNameUk && su.indexOf(origNameUk) === 0) ? su.slice(origNameUk.length) : tail;
              o.name_multilang.uk = upd.name_multilang.uk + tu;
            }
          }
        }
        if ('description_multilang' in upd) o.description_multilang = upd.description_multilang;
        if ('keywords' in upd) o.keywords = upd.keywords;
        if ('keywords_multilang' in upd) o.keywords_multilang = upd.keywords_multilang;
        return o;
      });
      if (batch.length) {
        try {
          await api('/edit', { store: store, products: batch });
          batch.forEach(function (o, i) { Object.assign(sibs[i], o); });
          report.push('Разновидности: обновлено ' + batch.length + ' шт.');
        } catch (e) {
          report.push('Разновидности: ошибка — ' + e.message);
        }
      }
    }

    if (store === 'blackstreet') {
      for (const key of ['bonna', 'core22']) {
        const chk = document.getElementById('sp-' + key);
        if (!chk || !chk.checked) continue;
        const twin = findTwin(key, p);
        if (!twin) { report.push(STORES[key].title + ': пара не найдена'); continue; }
        const copy = { id: twin.id };
        if ('price' in upd)       copy.price = upd.price;
        if ('presence' in upd)    copy.presence = upd.presence;
        if ('status' in upd)      copy.status = upd.status;
        if ('description' in upd) copy.description = upd.description;
        if ('description_multilang' in upd) copy.description_multilang = upd.description_multilang;
        if ('keywords' in upd) copy.keywords = upd.keywords;
        if ('keywords_multilang' in upd) copy.keywords_multilang = upd.keywords_multilang;
        if ('discount' in upd)    copy.discount = upd.discount;
        if ('images_urls' in upd) copy.images_urls = upd.images_urls;
        if ('sku' in upd)         copy.sku  = upd.sku + STORES[key].suffix;
        if ('name' in upd) {
          copy.name = upd.name + STORES[key].suffix;
          if (upd.name_multilang) {
            copy.name_multilang = {};
            if (upd.name_multilang.ru != null) copy.name_multilang.ru = upd.name_multilang.ru + STORES[key].suffix;
            if (upd.name_multilang.uk != null) copy.name_multilang.uk = upd.name_multilang.uk + STORES[key].suffix;
          }
        }
        try {
          await api('/edit', { store: key, products: [copy] });
          Object.assign(twin, copy);
          report.push(STORES[key].title + ': отправлено');
        } catch (e) {
          report.push(STORES[key].title + ': ошибка — ' + e.message);
        }
      }
    }

    showMsg(box, 'ok', report.map(escapeHtml).join('<br>') +
      '<br><span style="opacity:.7">Prom применяет изменения не мгновенно.</span>' +
      '<br><br><b>Ответ Prom:</b><pre>' + escapeHtml(JSON.stringify(lastResponse, null, 2)) + '</pre>' +
      '<b>Что отправляли:</b><pre>' + escapeHtml(JSON.stringify(upd, null, 2)) + '</pre>');
    buildGroups(); applyFilter();
  } catch (e) {
    showMsg(box, 'err', 'Prom не принял изменения.<pre>' + escapeHtml(e.message) + '</pre>' +
      '<span style="opacity:.8">Если ругается на конкретное поле — уберите его и сохраните остальное.</span>');
  } finally {
    btn.disabled = false;
  }
}

/* Пара в другом магазине: сначала точно по external_id, потом по артикулу и названию */
function findTwin(store, src) {
  const arr = byStore[store] || [];

  // 1) точная связь: у товара-приёмника external_id = id товара Black Street
  const exact = arr.find(p => p.external_id != null && String(p.external_id) === String(src.id));
  if (exact) return exact;

  // 2) запасной вариант — по артикулу и названию
  const base = baseSku(src.sku, 'blackstreet');
  const same = arr.filter(p => baseSku(p.sku, store) === base);
  if (!same.length) return null;
  if (same.length === 1) return same[0];
  const withSuf = ((src.name || '') + STORES[store].suffix).trim().toLowerCase();
  const plain = (src.name || '').trim().toLowerCase();
  return same.find(p => (p.name || '').trim().toLowerCase() === withSuf)
      || same.find(p => (p.name || '').trim().toLowerCase() === plain)
      || null;
}

/* ===================================================================== */
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
  });
}
const escapeAttr = escapeHtml;
