<style>
  :root {
    --bg:#0a0a0b; --panel:#141416; --panel2:#101013; --border:#26262b; --border-h:#3a3a42;
    --text:#e9e9ea; --dim:#b4b4b8; --faint:#75757c; --accent:#d6f24a; --green:#34d399; --red:#f87171;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; }
  .topbar { display:flex; align-items:center; justify-content:space-between;
            padding:14px 22px; border-bottom:1px solid var(--border); }
  .brand { font-weight:800; letter-spacing:.02em; }
  .brand span { color:var(--accent); }
  .brand small { display:block; font-weight:500; color:var(--faint); font-size:12px; margin-top:2px; }
  .home { color:var(--dim); text-decoration:none; font-size:13px; }
  .wrap { max-width:1100px; margin:0 auto; padding:20px 22px 60px; }

  .btn { display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border-radius:999px;
         border:1px solid var(--border-h); background:#1a1a1e; color:var(--text);
         font-family:var(--font); font-size:13.5px; font-weight:600; cursor:pointer; }
  .btn:hover { border-color:var(--accent); }

  .btn--sm { padding:7px 13px; font-size:13px; }

  input[type=text] { width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--border);
         background:#0f0f11; color:var(--text); font-family:var(--font); font-size:14px; }
  input:focus { outline:none; border-color:var(--accent); }

  .note { padding:12px 16px; border-radius:10px; font-size:13px; line-height:1.55; margin-bottom:14px; }
  .note--warn { background:rgba(214,242,74,.06); border:1px solid rgba(214,242,74,.22); color:var(--dim); }
  .note--err  { background:rgba(248,113,113,.08); border:1px solid rgba(248,113,113,.28); color:#fca5a5; }
  .note--ok   { background:rgba(52,211,153,.08); border:1px solid rgba(52,211,153,.28); color:#6ee7b7; }

  .searchbar { display:flex; gap:10px; align-items:center; margin-bottom:8px; }
  .searchbar input { flex:1; }
  .muted { color:var(--faint); font-size:12.5px; }

  .card { border:1px solid var(--border); border-radius:12px; background:var(--panel); margin-top:10px; overflow:hidden; }

  .card__name { font-weight:600; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card__meta { font-size:11.5px; color:var(--faint); margin-top:2px; }

  .detail { border-top:1px solid var(--border); padding:14px; display:none; }

             margin:14px 0 2px; font-weight:700; }

  details.grp { border:1px solid var(--border); border-radius:9px; margin-top:8px; padding:0 12px; background:var(--panel2); }

<body>
<header class="topbar">
  <div class="brand">ТОВАРЫ<span>//</span><small>Массовая смена артикула</small></div>
  <a class="home" href="../../index.html">← Главная</a>

<main class="wrap">
  <div id="conn"></div>

  <div id="app" style="display:none">
    <div class="searchbar">
      <input type="text" id="q" placeholder="Название товара (рус/укр), напр. Мужской летний костюм белый">
      <button class="btn btn--sm" id="find">Найти</button>
    </div>
    <div class="muted" id="hint">Введите название и нажмите «Найти». Показываются карточки, объединяющие все магазины.</div>
    <div id="results"></div>
  </div>
</main>

<script>
/* ==== конфиг и данные — те же, что у «Цены и наличие» ==== */
const CFG_KEY = 'tovary:prices:cfg';
const loadJSON = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
let cfg = loadJSON(CFG_KEY, { url:'', pass:'' });

const STORES = {
  blackstreet: { title:'Black Street', suffix:'',     kind:'prom' },
  bonna:       { title:'Bonna-shop',   suffix:' (B)', kind:'prom' },
  core22:      { title:'Core22',       suffix:' (С)', kind:'prom' },   // кириллическая С
  blink:       { title:'Blink',        suffix:'',     kind:'horoshop' },
};
const STORE_KEYS = Object.keys(STORES);
const PROM_STORES = ['blackstreet','bonna','core22'];
const MAIN = 'blackstreet';

const DB_NAME = 'tovary-prices', DB_STORE = 'stores';
let dbPromise = null, byStore = {}, groups = [];

const $ = (id) => document.getElementById(id);
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const escapeAttr = escapeHtml;
function decodeMsg(s){ try { return String(s).replace(/\\u([0-9a-fA-F]{4})/g,(m,h)=>String.fromCharCode(parseInt(h,16))); } catch(e){ return String(s); } }

async function api(route, payload){
  if (!cfg.url) throw new Error('Не задан адрес посредника (откройте «Цены и наличие» → Настройки).');
  const res = await fetch(cfg.url.replace(/\/+$/,'') + route, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'X-App-Password':cfg.pass },
    body: JSON.stringify(payload||{}),
  });
  const data = await res.json().catch(()=>({}));
  if (!res.ok){
    const d = data.detail ? '\n'+JSON.stringify(data.detail) : '';
    throw new Error(decodeMsg((data.error||('Ошибка '+res.status))+d));
  }
  return data;
}

/* ==== чтение кэша (заполняет основное приложение) ==== */
function db(){
  if (!dbPromise) dbPromise = new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = ()=>{ const d=req.result; if(!d.objectStoreNames.contains(DB_STORE)) d.createObjectStore(DB_STORE); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return dbPromise;
}
function cacheGet(key){
  return db().then(d=>new Promise((resolve,reject)=>{
    const r = d.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(key);
    r.onsuccess = ()=>resolve(r.result); r.onerror = ()=>reject(r.error);
  }));
}
async function loadFromCache(){
  let any = false;
  for (const key of STORE_KEYS){
    let products = [];
    try {
      let miss = 0;
      for (let i=0; i<200 && miss<3; i++){
        const part = await cacheGet(key+':'+i);
        if (part && Array.isArray(part.products) && part.products.length){ products = products.concat(part.products); miss=0; }
        else miss++;
      }
    } catch(e){}
    if (products.length){ byStore[key] = products; any = true; }
  }
  return any;
}

/* ==== группировка (та же логика связывания, что в основном приложении) ==== */
function baseSku(sku, store){
  let s = (sku||'').trim();
  // терпимо к латинской/кириллической C/В в суффиксе магазина
  if (store === 'core22') s = s.replace(/\s*\((?:С|C)\)\s*$/i, '').trim();
  else if (store === 'bonna') s = s.replace(/\s*\((?:B|В)\)\s*$/i, '').trim();
  else { const suf = (STORES[store].suffix||'').trim(); if (suf && s.endsWith(suf)) s = s.slice(0,-suf.length).trim(); }
  return s;
}
// нормализованное название: с конца убираем магазинный суффикс (B)/(С)
// и размер (S/M/L/XL/XXL или число), повторяя, — чтобы разновидности с
// размером в названии сводились к базовому названию товара.
const SIZE_RE = /^(?:xs|s|m|l|xl|xxl|xxxl|[2-5]xl|[0-9]{1,3}(?:[.,][05])?)$/i;
const SUF_RE  = /^\((?:B|В|C|С)\)$/i;
function normName(name){
  let parts = String(name||'').trim().split(/\s+/);
  while (parts.length > 1){
    const last = parts[parts.length - 1];
    if (SUF_RE.test(last) || SIZE_RE.test(last)) parts.pop();
    else break;
  }
  return parts.join(' ').toLowerCase().replace(/\s+/g, ' ');
}
function firstImage(p){
  if (Array.isArray(p.images) && p.images.length) return p.images[0].thumbnail_url || p.images[0].url || '';
  return p.main_image || '';
}
function siblingsOf(store, p){
  const arr = byStore[store] || [];
  if (p.variation_group_id != null) return arr.filter(x=>x.id!==p.id && x.variation_group_id===p.variation_group_id);
  const base = baseSku(p.sku, store);
  if (!base) return [];
  return arr.filter(x=>x.id!==p.id && baseSku(x.sku,store)===base);
}
function sizeToken(store, p){
  if (store === 'blink'){
    const parent = p.sku || '';
    const art = String(p.article || p.id || '');
    const tail = (parent && art.indexOf(parent)===0) ? art.slice(parent.length) : '';
    return tail.replace(/^[-_. ]+/,'').trim().toUpperCase();
  }
  const family = [p].concat(siblingsOf(store,p));
  const suf = (STORES[store].suffix||'').trim();
  const clean = (n)=>{ let x=(n||'').trim(); if(suf && x.endsWith(suf)) x=x.slice(0,-suf.length).trim(); return x; };
  let base = clean(family[0].name);
  for (const x of family){ const c=clean(x.name); if(c.length<base.length) base=c; }
  const me = clean(p.name);
  return (base && me.indexOf(base)===0 ? me.slice(base.length) : '').trim().toUpperCase();
}
// все варианты названия товара (рус + укр), нормализованные
// все возможные строки-названия товара (рус+укр, разные варианты полей,
// плюс название модификации у Хорошопа) — сырые, без нормализации
function allNames(p){
  const arr = [];
  const push = v => { if (v && typeof v === 'string') arr.push(v); };
  const obj = o => { if (o && typeof o === 'object') { push(o.ru); push(o.uk); push(o.ua); } };
  push(p.name);
  obj(p.name_multilang);
  push(p.name_ru); push(p.name_uk); push(p.name_ua);
  push(p.title); obj(p.title);
  // название модификации (Хорошоп): «Название модификации (RU/UA)»
  push(p.mod_name); push(p.modification); push(p.modification_name);
  obj(p.modification); obj(p.mod_name); obj(p.title_modification);
  return arr;
}
function nameVariants(p){
  const out = [];
  for (const n of allNames(p)){ const k = normName(n); if (k && out.indexOf(k) === -1) out.push(k); }
  return out;
}

// Связывание ТОЛЬКО ПО НАЗВАНИЮ (артикул не участвует). Товары объединяются,
// если у них совпадает нормализованное название хотя бы на одном языке —
// поэтому украинское и русское названия сцепляют магазины между собой.
function buildGroups(){
  const items = [];
  for (const store of STORE_KEYS) for (const p of (byStore[store]||[])){
    items.push({ store:store, p:p, keys:nameVariants(p) });
  }
  // объединение (union-find) по общим названиям
  const parent = items.map((_,i)=>i);
  function find(x){ while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; }
  function union(a,b){ const ra=find(a), rb=find(b); if(ra!==rb) parent[ra]=rb; }
  const keyToIdx = new Map();
  items.forEach(function(it,i){
    for (const k of it.keys){
      if (keyToIdx.has(k)) union(i, keyToIdx.get(k));
      else keyToIdx.set(k, i);
    }
  });
  const comps = new Map();
  items.forEach(function(it,i){
    const r = find(i);
    if (!comps.has(r)) comps.set(r, { key:'g'+r, stores:{}, _names:new Set() });
    const c = comps.get(r);
    (c.stores[it.store] = c.stores[it.store] || []).push(it.p);
    for (const k of it.keys) c._names.add(k);
  });
  groups = Array.from(comps.values());
  for (const g of groups){
    let best=null, img='', base='', search='';
    for (const store of STORE_KEYS){
      for (const p of (g.stores[store]||[])){
        const n = p.name || '';
        if ((store===MAIN || best===null) && (best===null || n.length < best.length)) best = n;
        if (!img) img = firstImage(p);
        if (!base && store===MAIN) base = (p.sku||'');
        search += ' ' + allNames(p).join(' ');
      }
    }
    if (!base){ for (const store of STORE_KEYS){ const a=(g.stores[store]||[])[0]; if(a){ base=a.sku||''; break; } } }
    g.name = best || '(без названия)';
    g.base = base || '';
    g.image = img;
    g.search = normSearch(search);
    // наборы слов по каждому названию (для оценки близости при поиске)
    g.names = Array.from(g._names).map(n => normSearch(n).split(' ').filter(Boolean));
    delete g._names;
  }
  groups.sort((a,b)=>a.name.localeCompare(b.name));
}

/* ==== ПЛАН новых артикулов по правилам ==== */
// набор родительских артикулов Blink, занятых ДРУГИМИ карточками
function blinkTakenExcept(g){
  const own = new Set((g.stores['blink']||[]).map(p=>String(p.id)));
  const taken = new Set();
  for (const p of (byStore['blink']||[])){
    if (own.has(String(p.id))) continue;
    const parent = (p.sku||'').trim().toLowerCase();
    if (parent) taken.add(parent);
  }
  return taken;
}
function planArticles(g, newBase){
  newBase = (newBase||'').trim();
  const plan = { prom:[], blink:[], blinkParent:'' };
  if (!newBase) return plan;

  // Prom: Black Street — без добавок, Bonna — (B), Core22 — (С); главный и разновидности одинаково
  for (const store of PROM_STORES){
    const suf = STORES[store].suffix;
    for (const p of (g.stores[store]||[])){
      plan.prom.push({ store:store, id:p.id, name:p.name, current:(p.sku||''), next:(newBase+suf) });
    }
  }

  // Blink: уникальный родительский артикул (при коллизии → (коп1), (коп2)…)
  const blink = g.stores['blink'] || [];
  if (blink.length){
    const taken = blinkTakenExcept(g);
    let parent = newBase, n = 0;
    while (taken.has(parent.trim().toLowerCase())){ n++; parent = newBase + '(коп'+n+')'; }
    plan.blinkParent = parent;
    // главный (без размера) первым
    const rows = blink.map(p=>({ p:p, size:sizeToken('blink',p) }));
    rows.sort((a,b)=> (a.size?1:0)-(b.size?1:0) || a.size.localeCompare(b.size));
    for (const r of rows){
      const article = r.size ? (parent + ' ' + r.size) : parent;
      plan.blink.push({
        id: r.p.id,
        name: r.p.name,
        size: r.size,
        currentArticle: String(r.p.article || r.p.id || ''),
        currentParent: (r.p.sku||''),
        parent: parent,          // Родительский артикул
        display: parent,         // Артикул для отображения на сайте
        article: article,        // Артикул (уникальный)
      });
    }
  }
  return plan;
}

/* ==== применение на Prom (тест, 1 карточка) ==== */
async function applyPromCard(plan){
  const jobs = {};
  for (const it of plan.prom){ (jobs[it.store] = jobs[it.store] || []).push({ id:it.id, sku:it.next }); }
  const report = [];
  for (const store of PROM_STORES){
    const list = jobs[store]; if (!list || !list.length) continue;
    try {
      const res = await api('/edit', { store:store, products:list });
      const ok = ((res && res.processed_ids) || []).map(String);
      let line = STORES[store].title + ': принято ' + ok.length + ' из ' + list.length;
      if (ok.length < list.length) line += ' · ответ Prom: ' + escapeHtml(JSON.stringify(res).slice(0,300));
      report.push({ ok: ok.length === list.length && list.length>0, text: line });
    } catch(e){
      report.push({ ok:false, text: STORES[store].title + ': ' + escapeHtml(e.message) });
    }
  }
  return report;
}

/* ==== интерфейс ==== */
function renderConn(){
  const box = $('conn');
  if (!cfg.url || !cfg.pass){
    box.innerHTML = '<div class="note note--err">Нет данных подключения. Откройте приложение «Цены и наличие», нажмите «Настройки» и сохраните адрес посредника и пароль — они общие для обоих приложений.</div>';
    return false;
  }
  return true;
}

// поиск без привязки к знакам/пробелам: разбиваем на слова, требуем все
function normSearch(s){
  return String(s||'').toLowerCase().replace(/[^0-9a-zа-яёіїєґ]+/gi, ' ').replace(/\s+/g,' ').trim();
}
// коэффициент Дайса по словам (насколько два набора похожи, 0..1)
function diceWords(qset, arr){
  if (!arr || !arr.length) return 0;
  let inter = 0; for (const w of arr) if (qset.has(w)) inter++;
  return (qset.size + arr.length) ? (2*inter) / (qset.size + arr.length) : 0;
}
let matches = [];
function doSearch(){
  const box = $('results');
  const words = normSearch($('q').value).split(' ').filter(Boolean);
  if (!words.length){ box.innerHTML = ''; $('hint').textContent = 'Введите название и нажмите «Найти».'; return; }
  const qset = new Set(words);
  const scored = groups.map(function(g){
    const t = g.search || normSearch(g.name);
    let found = 0; for (const w of qset) if (t.indexOf(w) !== -1) found++;
    const coverage = found / qset.size;                 // сколько слов запроса нашлось
    let dice = 0; for (const nm of (g.names||[])){ const d = diceWords(qset, nm); if (d > dice) dice = d; }
    return { g:g, coverage:coverage, dice:dice };
  }).filter(x => x.coverage >= 0.6)                      // порог: не меньше 60% слов запроса
    .sort((a,b) => b.coverage - a.coverage || b.dice - a.dice);  // точные — выше
  matches = scored.slice(0, 60).map(x => x.g);
  $('hint').textContent = 'Найдено карточек: ' + matches.length + (scored.length > 60 ? ' (показаны первые 60)' : '');
  box.innerHTML = matches.map((g,i)=>cardHtml(g,i)).join('') || '<div class="empty">Ничего не найдено — попробуйте меньше слов</div>';
}

function storeCounts(g){
  return STORE_KEYS.filter(k=>(g.stores[k]||[]).length)
    .map(k=>STORES[k].title+': '+(g.stores[k].length)).join(' · ');
}

function cardHtml(g, i){
  return '<div class="card" id="card-'+i+'">' +
    '<div class="card__top" onclick="toggleCard('+i+')">' +
      (g.image ? '<img class="card__img" src="'+escapeHtml(g.image)+'" alt="">' : '<span class="card__img"></span>') +
      '<div class="card__body"><div class="card__name">'+escapeHtml(g.name)+'</div>' +
      '<div class="card__meta">Артикул: '+escapeHtml(g.base)+' · '+escapeHtml(storeCounts(g))+'</div></div>' +
      '<span class="card__chev">▸</span>' +
    '</div>' +
    '<div class="detail" id="detail-'+i+'"></div>' +
  '</div>';
}

function toggleCard(i){
  const card = $('card-'+i);
  const open = card.classList.toggle('is-open');
  if (open && !$('detail-'+i).dataset.ready){
    $('detail-'+i).innerHTML = detailHtml(i);
    $('detail-'+i).dataset.ready = '1';
  }
}

function detailHtml(i){
  const g = matches[i];
  let cur = '<div class="store-h">Сейчас в магазинах</div>';
  for (const store of STORE_KEYS){
    const arr = g.stores[store] || [];
    if (!arr.length) continue;
    cur += '<details class="grp"><summary><b>'+escapeHtml(STORES[store].title)+'</b> ' +
        '<span class="muted">('+arr.length+' поз.)</span></summary>' +
      '<table>' + arr.map(function(p){
        const im = firstImage(p);
        return '<tr>' +
          '<td style="width:44px">' + (im ? '<img class="thumb" src="'+escapeAttr(im)+'" alt="">' : '<span class="thumb"></span>') + '</td>' +
          '<td>'+escapeHtml((p.name||'').slice(0,55))+'</td>' +
          '<td class="old">'+escapeHtml(p.sku||p.article||'—')+'</td></tr>';
      }).join('') +
      '</table></details>';
  }
  const missing = STORE_KEYS.filter(k => !(g.stores[k]||[]).length).map(k => STORES[k].title);
  if (missing.length) cur += '<div class="muted" style="margin-top:6px">Нет на: ' + escapeHtml(missing.join(', ')) + '</div>';
  return cur +
    '<div class="row" style="margin-top:14px">' +
      '<label>Новый артикул:</label>' +
      '<input type="text" id="newart-'+i+'" placeholder="напр. Хар-11" oninput="renderPreview('+i+')">' +
      '<button class="btn btn--sm" onclick="renderPreview('+i+')">Показать превью</button>' +
    '</div>' +
    '<div id="preview-'+i+'"></div>';
}

function renderPreview(i){
  const g = matches[i];
  const base = $('newart-'+i).value.trim();
  const box = $('preview-'+i);
  if (!base){ box.innerHTML = '<div class="muted">Введите новый артикул, чтобы увидеть превью.</div>'; return; }
  const plan = planArticles(g, base);

  let html = '<div class="store-h">Что станет с артикулом</div>';

  // Prom — по одной сводной строке на магазин, разновидности спрятаны
  for (const store of PROM_STORES){
    const items = plan.prom.filter(it => it.store === store);
    if (!items.length) continue;
    const next = items[0].next;
    html += '<details class="grp"><summary>' +
        '<b>'+escapeHtml(STORES[store].title)+'</b> → <span class="new">'+escapeHtml(next)+'</span> ' +
        '<span class="muted">('+items.length+' поз.)</span></summary>' +
      '<table>' + items.map(it =>
        '<tr><td>'+escapeHtml((it.name||'').slice(0,50))+'</td>' +
        '<td class="old">'+escapeHtml(it.current||'—')+'</td><td>→</td>' +
        '<td class="new">'+escapeHtml(it.next)+'</td></tr>').join('') +
      '</table></details>';
  }

  // Blink — сводка + разновидности в раскрывающемся списке
  if (plan.blink.length){
    const kop = plan.blinkParent !== base;
    html += '<details class="grp"><summary>' +
        '<b>Blink</b> → родит. артикул <span class="new">'+escapeHtml(plan.blinkParent)+'</span> ' +
        '<span class="muted">('+plan.blink.length+' поз.)</span>' +
        (kop ? ' <span class="kop">артикул занят → '+escapeHtml(plan.blinkParent)+'</span>' : '') +
      '</summary>' +
      '<table><tr><th>Размер</th><th>Артикул (было → станет)</th></tr>' +
        plan.blink.map(b =>
          '<tr><td>'+escapeHtml(b.size||'главный')+'</td>' +
          '<td><span class="old">'+escapeHtml(b.currentArticle||'—')+'</span> → <span class="new">'+escapeHtml(b.article)+'</span></td></tr>').join('') +
      '</table>' +
      '<div class="note note--warn" style="margin-top:8px">Blink пока только превью. Родительский артикул и «Артикул для сайта» = '+escapeHtml(plan.blinkParent)+' у всех. Запись на Хорошоп включим после теста на Prom.</div>' +
      '</details>';
  }

  // применение на Prom
  html += '<div class="row" style="margin-top:14px">' +
    '<button class="btn btn--go btn--sm" id="apply-'+i+'" onclick="testApply('+i+')">Тест: применить на Prom (эта карточка)</button>' +
    '<span class="muted">Изменит артикул только на Prom и только у этой карточки. Обратимо.</span>' +
    '</div><div id="applyres-'+i+'"></div>';

  box.innerHTML = html;
}

async function testApply(i){
  const g = matches[i];
  const base = $('newart-'+i).value.trim();
  if (!base) return;
  if (!confirm('Применить артикул «'+base+'» на Prom для этой карточки (Black Street / Bonna / Core22)?')) return;
  const btn = $('apply-'+i); btn.disabled = true; btn.textContent = 'Отправляю…';
  const res = $('applyres-'+i);
  res.innerHTML = '<div class="note note--warn">Отправляю на Prom…</div>';
  try {
    const plan = planArticles(g, base);
    const report = await applyPromCard(plan);
    const allOk = report.every(r=>r.ok);
    res.innerHTML = '<div class="note note--'+(allOk?'ok':'err')+'">' +
      report.map(r=>escapeHtml(r.text)).join('<br>') +
      '<br><br>Проверьте товар в кабинете Prom: сменился ли артикул. Если да — включим массовый режим и Blink.</div>';
  } catch(e){
    res.innerHTML = '<div class="note note--err">'+escapeHtml(e.message)+'</div>';
  }
  btn.disabled = false; btn.textContent = 'Тест: применить на Prom (эта карточка)';
}

/* ==== старт ==== */
(async function init(){
  if (!renderConn()) return;
  const ok = await loadFromCache();
  if (!ok){
    $('conn').innerHTML = '<div class="note note--warn">В памяти нет загруженных товаров. Откройте «Цены и наличие», нажмите «Обновить из Prom» (данные общие), потом вернитесь сюда.</div>';
    return;
  }
  buildGroups();
  $('app').style.display = '';
  // диагностика: сколько товаров и у скольких есть второе название
  let total = 0, withMl = 0;
  for (const k of STORE_KEYS) for (const p of (byStore[k]||[])){
    total++;
    if (p.name_multilang && (p.name_multilang.ru || p.name_multilang.uk || p.name_multilang.ua)) withMl++;
  }
  const mlNote = withMl ? ('со вторым названием: '+withMl+' из '+total)
    : ('второго названия НЕТ — залей обновлённый catalog-index.html и нажми «Обновить из Prom» (иначе связывание укр↔рус не работает)');

  // Диагностика: сырые поля по одному товару с каждого магазина — чтобы точно
  // увидеть, какие поля реально приходят (пришли мне скрин этого блока).
  let diag = '';
  for (const k of STORE_KEYS){
    const p = (byStore[k]||[])[0];
    if (!p) { diag += STORES[k].title + ': нет данных\n\n'; continue; }
    const shown = {};
    for (const f of Object.keys(p)){
      if (f === 'images') continue;
      let v = p[f];
      if (typeof v === 'string' && v.length > 120) v = v.slice(0,120) + '…';
      shown[f] = v;
    }
    diag += '### ' + STORES[k].title + '\n' + JSON.stringify(shown, null, 1) + '\n\n';
  }

  $('conn').innerHTML = '<div class="note note--ok">Данные загружены: карточек '+groups.length+' · '+mlNote+'. Найдите товар по названию.</div>' +
    '<details class="diag"><summary class="muted" style="cursor:pointer">🔧 Диагностика данных (пришли скрин этого, если поиск барахлит)</summary>' +
    '<pre>'+escapeHtml(diag)+'</pre></details>';
  $('find').addEventListener('click', doSearch);
  $('q').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
})();
</script>
