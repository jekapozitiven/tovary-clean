<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Цены и наличие — Товары</title>

<link rel="icon" href="../../favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="../../favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="../../apple-touch-icon.png">
<link rel="stylesheet" href="../../assets/portal.css">

<style>
  .wrap { max-width: 1500px; }

  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: var(--radius); padding: clamp(16px, 3vw, 24px); margin-bottom: 14px; }
  .panel h2 { margin: 0 0 4px; font-size: 15px; font-weight: 700; }
  .panel .sub { margin: 0 0 16px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }

  label.f { display: block; margin-bottom: 12px; }
  label.f > span { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }

  input[type=text], input[type=password], input[type=number], input[type=date], select, textarea {
    width: 100%; font-family: var(--font); font-size: 14px; color: var(--text);
    background: #0e0e10; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 9px 12px;
  }
  input:focus, select:focus { outline: none; border-color: var(--border-hover); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px;
         padding: 9px 17px; font-size: 14px; font-weight: 700; font-family: var(--font);
         color: #0a0a0b; background: var(--accent); border: none; border-radius: 999px;
         cursor: pointer; transition: opacity .15s, transform .1s; }
  .btn:hover { opacity: .9; }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn--ghost { color: var(--text); background: transparent; border: 1px solid var(--border); }
  .btn--sm { padding: 7px 13px; font-size: 13px; }

  .toolbar { display: flex; gap: 9px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .toolbar .search { flex: 1; min-width: 200px; }
  .toolbar select, .toolbar input[type=text] { width: auto; }
  .muted { font-size: 12.5px; color: var(--text-faint); }

  /* Постоянные настройки применения */
  .opts { display: flex; gap: 18px; flex-wrap: wrap; align-items: center;
          padding: 12px 16px; margin-bottom: 12px; border-radius: var(--radius-sm);
          background: rgba(214,242,74,.05); border: 1px solid rgba(214,242,74,.18); }
  .chk { display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; cursor: pointer; white-space: nowrap; }
  .chk input { width: 16px; height: 16px; accent-color: var(--accent); }
  .step { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-dim); }
  .step input { width: 72px; text-align: center; padding: 6px 8px; }

  /* Массовая правка */
  .mass { display: none; gap: 10px; flex-wrap: wrap; align-items: flex-end;
          padding: 14px 16px; margin-bottom: 12px; border-radius: var(--radius-sm);
          background: #141416; border: 1px solid var(--border-hover); }
  .mass.is-on { display: flex; }
  .mass__n { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; align-self: center; }
  .mass label { margin: 0; }
  .mass label > span { font-size: 11.5px; }
  .mass .w-price { width: 110px; }
  .mass .w-disc  { width: 90px; }
  .mass .w-type  { width: 62px; }
  .mass .w-date  { width: 140px; }
  .mass .w-sel   { width: 150px; }

  .progress { height: 3px; background: #1e1e22; border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
  .progress i { display: block; height: 100%; background: var(--accent); width: 0; transition: width .2s; }

  .cols { display: grid; grid-template-columns: minmax(0,1.25fr) minmax(0,1fr); gap: 14px; align-items: start; }
  @media (max-width: 1050px) { .cols { grid-template-columns: 1fr; } }

  .list { max-height: 74vh; overflow-y: auto; }

  .grp { border-bottom: 1px solid var(--border); }
  .grp:last-child { border-bottom: none; }
  .grp__top { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
  .grp__top:hover { background: var(--panel-hover); }
  .grp__chk { width: 16px; height: 16px; flex: none; accent-color: var(--accent); cursor: pointer; }
  .grp__btn { display: flex; align-items: center; gap: 11px; flex: 1; min-width: 0;
              background: transparent; border: none; cursor: pointer;
              font-family: var(--font); color: var(--text); text-align: left; padding: 0; }
  .grp__img { width: 40px; height: 40px; flex: none; border-radius: 6px; object-fit: cover;
              background: #17171a; border: 1px solid var(--border); }
  .grp__body { flex: 1; min-width: 0; }
  .grp__name { display: block; font-size: 13.5px; font-weight: 600;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .grp__meta { display: block; font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }
  .grp__chev { color: var(--text-faint); font-size: 11px; flex: none; }
  .grp.is-open .grp__chev { transform: rotate(90deg); }
  .grp__kids { display: none; padding: 0 12px 12px 38px; }
  .grp.is-open .grp__kids { display: block; }

  .sb { margin-top: 8px; }
  .sb__t { font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
           color: var(--text-faint); margin-bottom: 5px; }
  .sb__t b { color: var(--text-dim); }

  .kid { display: flex; gap: 9px; align-items: center; width: 100%;
         padding: 6px 10px; margin-bottom: 4px; background: #101013;
         border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .kid:hover { border-color: var(--border-hover); }
  .kid.is-active { border-color: var(--accent); }
  .kid__chk { width: 15px; height: 15px; flex: none; accent-color: var(--accent); cursor: pointer; }
  .kid__btn { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;
              padding: 3px 0; background: transparent; border: none; cursor: pointer;
              font-family: var(--font); color: var(--text); text-align: left; }
  .kid__size { flex: none; min-width: 58px; font-size: 11.5px; font-weight: 700; color: var(--accent); }
  .kid__name { flex: 1; min-width: 0; font-size: 12.5px;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kid__price { font-size: 12.5px; color: var(--text-dim); white-space: nowrap; }
  .kid__old { font-size: 11.5px; color: var(--text-faint); text-decoration: line-through; white-space: nowrap; }

  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .dot-on { background: var(--green); }
  .dot-off { background: #6b6b66; }
  .miss { font-size: 12px; color: var(--text-faint); padding: 5px 10px; }

  .ed__head { display: flex; gap: 11px; align-items: flex-start; margin-bottom: 16px; }
  .ed__thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover;
               background: #17171a; border: 1px solid var(--border); flex: none; }
  .ed__title { font-size: 14.5px; font-weight: 700; line-height: 1.35; }
  .ed__id { font-size: 11.5px; color: var(--text-faint); margin-top: 3px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } }

  .final { font-size: 12.5px; color: var(--green); margin-top: 6px; min-height: 16px; }
  .bar { display: flex; gap: 9px; flex-wrap: wrap; align-items: center;
         margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }

  .msg { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px;
         line-height: 1.55; margin-top: 10px; }
  .msg--ok   { background: rgba(52,211,153,.08); border: 1px solid rgba(52,211,153,.25); color: #6ee7b7; }
  .msg--err  { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.25); color: #fca5a5; }
  .msg--warn { background: rgba(214,242,74,.06); border: 1px solid rgba(214,242,74,.2); color: var(--text-dim); }
  .msg pre { margin: 8px 0 0; white-space: pre-wrap; word-break: break-word; font-size: 12px; opacity: .85; }

  .empty { padding: 36px 20px; text-align: center; color: var(--text-faint); font-size: 13.5px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand__name">ТОВАРЫ<span class="slash">//</span></div>
    <div class="brand__sub">Цены и наличие</div>
  </div>
  <a class="home-btn" href="../../index.html"><span class="home-btn__arrow">←</span> Главная</a>
</header>

<main class="wrap">

  <!-- Подключение -->
  <div class="panel" id="setup">
    <h2>Подключение</h2>
    <p class="sub">Адрес посредника и пароль приложения. Вводится один раз.</p>
    <div class="grid2">
      <label class="f"><span>Адрес посредника</span>
        <input type="text" id="cfg-url" placeholder="https://…workers.dev"></label>
      <label class="f"><span>Пароль приложения</span>
        <input type="password" id="cfg-pass" placeholder="секрет APP_PASSWORD"></label>
    </div>
    <div class="bar" style="border:none; padding-top:0; margin-top:0;">
      <button class="btn" id="cfg-save">Проверить и сохранить</button>
      <button class="btn btn--ghost btn--sm hidden" id="cfg-hide">Свернуть</button>
    </div>
    <div id="cfg-msg"></div>
  </div>

  <div id="work" class="hidden">

    <div class="toolbar">
      <button class="btn btn--sm" id="load">Обновить из Prom</button>
      <input type="text" class="search" id="search" placeholder="Артикул или название…">
      <select id="fstatus"><option value="">Все статусы</option></select>
      <button class="btn btn--ghost btn--sm" id="sel-all">Выбрать найденные</button>
      <button class="btn btn--ghost btn--sm" id="sel-none">Снять выбор</button>
      <button class="btn btn--ghost btn--sm" id="cfg-open">Настройки</button>
    </div>

    <!-- Как применять изменения -->
    <div class="opts">
      <label class="chk"><input type="checkbox" id="opt-variants" checked>
        Применять ко всем разновидностям</label>
      <label class="chk"><input type="checkbox" id="opt-stores" checked>
        Дублировать на другие магазины</label>
      <span class="step">Bonna-shop: <input type="number" step="0.01" id="step-bonna" value="0"> ₴</span>
      <span class="step">Core22: <input type="number" step="0.01" id="step-core22" value="0"> ₴</span>
      <span class="step">Blink: <input type="number" step="0.01" id="step-blink" value="0"> ₴</span>
      <span class="muted">шаг прибавляется к цене Black Street</span>
    </div>

    <!-- Массовая правка -->
    <div class="mass" id="mass">
      <span class="mass__n" id="mass-n">выбрано 0</span>
      <label class="f"><span>Цена без скидки</span>
        <input type="number" step="0.01" class="w-price" id="m-price" placeholder="не менять"></label>
      <label class="f"><span>Скидка</span>
        <input type="number" step="0.01" class="w-disc" id="m-disc" placeholder="—"></label>
      <label class="f"><span>Тип</span>
        <select class="w-type" id="m-disc-type"><option value="amount">₴</option><option value="percent">%</option></select></label>
      <label class="f"><span>Скидка с</span>
        <input type="date" class="w-date" id="m-disc-from"></label>
      <label class="f"><span>по</span>
        <input type="date" class="w-date" id="m-disc-to"></label>
      <label class="f"><span>Наличие</span>
        <select class="w-sel" id="m-presence">
          <option value="">не менять</option>
          <option value="available">В наличии</option>
          <option value="not_available">Нет в наличии</option>
          <option value="order">Под заказ</option>
          <option value="waiting_for_supply">Ожидается поставка</option>
        </select></label>
      <label class="f"><span>Видимость</span>
        <select class="w-sel" id="m-status">
          <option value="">не менять</option>
          <option value="on_display">Опубликован</option>
          <option value="draft">Скрыт</option>
        </select></label>
      <button class="btn" id="m-apply">Применить к выбранным</button>
      <button class="btn btn--ghost btn--sm" id="m-clear-disc">Убрать скидку</button>
    </div>

    <div class="progress hidden" id="prog"><i></i></div>
    <div id="stats"></div>

    <div class="cols">
      <div class="panel" style="padding:6px;">
        <div class="list" id="list"><div class="empty">Нажмите «Обновить из Prom»</div></div>
      </div>
      <div class="panel" id="editor"><div class="empty">Выберите позицию слева</div></div>
    </div>
  </div>

</main>

<script>
/* ===================================================================== */
/*  Настройки                                                             */
/* ===================================================================== */
const CFG_KEY = 'tovary:prices:cfg';
const OPT_KEY = 'tovary:prices:opts';
const loadJSON = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
const saveJSON = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

let cfg  = loadJSON(CFG_KEY, { url: '', pass: '' });
let opts = loadJSON(OPT_KEY, { variants: true, stores: true, stepBonna: 0, stepCore22: 0, stepBlink: 0 });

const STORES = {
  blackstreet: { title: 'Black Street', suffix: ''     },
  bonna:       { title: 'Bonna-shop',   suffix: ' (B)' },
  core22:      { title: 'Core22',       suffix: ' (С)' },
  blink:       { title: 'Blink',        suffix: ''     },   // сайт на Хорошопе
};
const STORE_KEYS = Object.keys(STORES);
const MAIN = 'blackstreet';

const STATUS_RU = {
  on_display: 'опубликован', draft: 'скрыт', not_on_display: 'не показывается',
  deleted: 'удалён', approved: 'одобрен', editing_required: 'требует правки',
  waiting_for_moderation: 'на модерации',
};
const PRESENCE_RU = {
  available: 'В наличии', not_available: 'Нет в наличии', order: 'Под заказ',
  service: 'Услуга', waiting_for_supply: 'Ожидается поставка',
};

let byStore = {};
let groups = [];
let shown = [];
let current = null;
let openKey = null;
let picked = new Set();      // "store:id"
let cacheAge = null;
let cacheReport = [];

const DB_NAME = 'tovary-prices';
const DB_STORE = 'stores';
let dbPromise = null;
const CHUNK = 2000;

const $ = (id) => document.getElementById(id);
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
  });
}
const escapeAttr = escapeHtml;
const showMsg = (el, kind, html) => { el.innerHTML = '<div class="msg msg--' + kind + '">' + html + '</div>'; };

function decodeMsg(s) {
  try {
    return String(s).replace(/\\u([0-9a-fA-F]{4})/g,
      function (m, h) { return String.fromCharCode(parseInt(h, 16)); });
  } catch (e) { return String(s); }
}

/* ===================================================================== */
/*  Связь с посредником                                                   */
/* ===================================================================== */
async function api(route, payload) {
  if (!cfg.url) throw new Error('Не задан адрес посредника');
  const res = await fetch(cfg.url.replace(/\/+$/, '') + route, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-App-Password': cfg.pass },
    body: JSON.stringify(payload || {}),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const d = data.detail ? '\n' + JSON.stringify(data.detail, null, 2) : '';
    throw new Error(decodeMsg((data.error || ('Ошибка ' + res.status)) + d));
  }
  return data;
}

/* ===================================================================== */
/*  Хранилище на устройстве                                               */
/* ===================================================================== */
function db() {
  if (!dbPromise) {
    dbPromise = new Promise(function (resolve, reject) {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function () {
        const d = req.result;
        if (!d.objectStoreNames.contains(DB_STORE)) d.createObjectStore(DB_STORE);
      };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
  }
  return dbPromise;
}
function cacheGet(key) {
  return db().then(d => new Promise(function (resolve, reject) {
    const tx = d.transaction(DB_STORE, 'readonly');
    const r = tx.objectStore(DB_STORE).get(key);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  }));
}
function cachePut(key, value) {
  return db().then(d => new Promise(function (resolve, reject) {
    const tx = d.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(value, key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error || new Error('ошибка записи'));
    tx.onabort = () => reject(tx.error || new Error('запись прервана'));
  }));
}
function cacheDel(key) {
  return db().then(d => new Promise(function (resolve) {
    const tx = d.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(key);
    tx.oncomplete = resolve; tx.onerror = resolve; tx.onabort = resolve;
  }));
}

/* В хранилище — только нужное для списка */
const KEEP = ['id', 'external_id', 'name', 'sku', 'price', 'presence', 'status',
              'discount', 'variation_group_id', 'quantity_in_stock'];
function slim(p) {
  const o = {};
  for (const k of KEEP) if (p[k] !== undefined) o[k] = p[k];
  if (Array.isArray(p.images) && p.images.length) {
    const i = p.images[0];
    o.images = [{ url: i.url, thumbnail_url: i.thumbnail_url }];
  }
  return o;
}

async function loadFromCache() {
  let any = false, oldest = null;
  cacheReport = [];
  for (const key of STORE_KEYS) {
    let products = [], err = '';
    try {
      const head = await cacheGet(key);
      if (head && head.savedAt && (!oldest || head.savedAt < oldest)) oldest = head.savedAt;
      let miss = 0;
      for (let i = 0; i < 200 && miss < 3; i++) {
        const part = await cacheGet(key + ':' + i);
        if (part && Array.isArray(part.products) && part.products.length) {
          products = products.concat(part.products); miss = 0;
        } else miss++;
      }
    } catch (e) { err = e.message; }

    if (products.length) {
      byStore[key] = products; any = true;
      cacheReport.push('✓ ' + STORES[key].title + ': ' + products.length);
    } else {
      cacheReport.push('✗ ' + STORES[key].title + ': пусто' + (err ? ' (' + err + ')' : ''));
    }
  }
  if (!any) return false;
  cacheAge = oldest;
  buildGroups(); showStats(); applyFilter();
  return true;
}

/* ===================================================================== */
/*  Настройка подключения                                                 */
/* ===================================================================== */
$('cfg-url').value = cfg.url;
$('cfg-pass').value = cfg.pass;

$('cfg-save').addEventListener('click', async function () {
  cfg.url = $('cfg-url').value.trim();
  cfg.pass = $('cfg-pass').value;
  showMsg($('cfg-msg'), 'warn', 'Проверяю связь…');
  try {
    await api('/ping', {});
    saveJSON(CFG_KEY, cfg);
    showMsg($('cfg-msg'), 'ok', 'Связь есть.');
    $('work').classList.remove('hidden');
    $('cfg-hide').classList.remove('hidden');
    setTimeout(() => $('setup').classList.add('hidden'), 600);
    loadFromCache();
  } catch (e) {
    showMsg($('cfg-msg'), 'err', 'Не получилось.<pre>' + escapeHtml(e.message) + '</pre>');
  }
});
$('cfg-open').addEventListener('click', function () {
  $('setup').classList.remove('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' });
});
$('cfg-hide').addEventListener('click', () => $('setup').classList.add('hidden'));

if (cfg.url && cfg.pass) {
  $('setup').classList.add('hidden');
  $('cfg-hide').classList.remove('hidden');
  $('work').classList.remove('hidden');
  loadFromCache().then(function (ok) {
    if (!ok) $('stats').innerHTML =
      '<div class="msg msg--warn">Данных нет. Нажмите «Обновить из Prom».<br>' +
      cacheReport.map(escapeHtml).join('<br>') + '</div>';
  }).catch(function (e) {
    $('stats').innerHTML = '<div class="msg msg--err">Сбой чтения: ' + escapeHtml(e.message) + '</div>';
  });
}

/* ===================================================================== */
/*  Настройки применения                                                  */
/* ===================================================================== */
$('opt-variants').checked = !!opts.variants;
$('opt-stores').checked = !!opts.stores;
$('step-bonna').value = opts.stepBonna || 0;
$('step-core22').value = opts.stepCore22 || 0;
$('step-blink').value = opts.stepBlink || 0;

function saveOpts() {
  opts = {
    variants: $('opt-variants').checked,
    stores: $('opt-stores').checked,
    stepBonna: Number($('step-bonna').value) || 0,
    stepCore22: Number($('step-core22').value) || 0,
    stepBlink: Number($('step-blink').value) || 0,
  };
  saveJSON(OPT_KEY, opts);
}
['opt-variants', 'opt-stores', 'step-bonna', 'step-core22', 'step-blink']
  .forEach(id => $(id).addEventListener('change', saveOpts));

const stepFor = (store) => store === 'bonna'  ? (Number($('step-bonna').value)  || 0)
                        : store === 'core22' ? (Number($('step-core22').value) || 0)
                        : store === 'blink'  ? (Number($('step-blink').value)  || 0) : 0;

/* ===================================================================== */
/*  Загрузка из Prom                                                      */
/* ===================================================================== */
$('load').addEventListener('click', loadAll);

async function loadStore(store, onProgress) {
  const out = [], seen = new Set();
  let lastId = null, guard = 0, savedUpTo = 0;
  const savedAt = Date.now();

  async function flush() {
    const to = out.length;
    if (to <= savedUpTo) return;
    for (let i = Math.floor(savedUpTo / CHUNK); i * CHUNK < to; i++) {
      const slice = out.slice(i * CHUNK, (i + 1) * CHUNK);
      if (slice.length) await cachePut(store + ':' + i, { products: slice.map(slim), savedAt: savedAt });
    }
    await cachePut(store, { parts: Math.ceil(to / CHUNK), savedAt: savedAt, total: to });
    savedUpTo = to;
  }

  while (guard++ < 3000) {
    let data = null, tries = 0;
    while (tries++ < 4) {
      try { data = await api('/list', { store: store, limit: 100, last_id: lastId, offset: out.length }); break; }
      catch (e) {
        if (tries >= 4) { try { await flush(); } catch (x) {} const err = new Error(e.message); err.partial = out; throw err; }
        onProgress(out.length, 'нет ответа, жду ' + (tries * 5) + ' сек…');
        await sleep(tries * 5000);
      }
    }
    const batch = (data && data.products) || [];
    if (!batch.length) break;
    let added = 0;
    for (const p of batch) { if (seen.has(p.id)) continue; seen.add(p.id); out.push(p); added++; }
    const next = batch[batch.length - 1].id;
    if (next === lastId) break;
    lastId = next;
    onProgress(out.length, '');
    if (out.length - savedUpTo >= CHUNK) { try { await flush(); } catch (e) {} }
    if (added === 0 && batch.length < 100) break;
    await sleep(30);
  }
  await flush();
  return out;
}

async function loadAll() {
  const btn = $('load'), prog = $('prog');
  btn.disabled = true;
  prog.classList.remove('hidden');
  const counts = {}, notes = {}, problems = [];

  function paint() {
    $('stats').innerHTML = '<div class="msg msg--warn">Загружаю все магазины…<br>' +
      STORE_KEYS.map(k => STORES[k].title + ': <b>' + (counts[k] || 0) + '</b>' +
        (notes[k] ? ' — ' + escapeHtml(notes[k]) : '')).join('<br>') + '</div>';
    const total = STORE_KEYS.reduce((n, k) => n + (counts[k] || 0), 0);
    prog.firstElementChild.style.width = Math.min(97, 2 + total / 700) + '%';
  }

  await Promise.all(STORE_KEYS.map(async function (key) {
    let list = null;
    try {
      list = await loadStore(key, function (n, note) { counts[key] = n; notes[key] = note; paint(); });
    } catch (e) {
      list = e.partial || null;
      problems.push(STORES[key].title + ': ' + e.message);
    }
    if (list && list.length) {
      byStore[key] = list;
      const parts = Math.ceil(list.length / CHUNK);
      for (let i = parts; i < parts + 12; i++) { try { await cacheDel(key + ':' + i); } catch (e) {} }
    }
  }));

  prog.firstElementChild.style.width = '100%';
  cacheAge = Date.now();
  buildGroups(); showStats(); applyFilter();
  if (problems.length) {
    $('stats').innerHTML += '<div class="msg msg--err">' + problems.map(escapeHtml).join('<br>') + '</div>';
  }
  btn.disabled = false;
  setTimeout(() => prog.classList.add('hidden'), 500);
}

/* ===================================================================== */
/*  Группировка                                                           */
/* ===================================================================== */
function baseSku(sku, store) {
  let s = (sku || '').trim();
  const suf = (STORES[store].suffix || '').trim();
  if (suf && s.endsWith(suf)) s = s.slice(0, -suf.length).trim();
  return s;
}
function firstImage(p) {
  if (Array.isArray(p.images) && p.images.length) return p.images[0].thumbnail_url || p.images[0].url || '';
  return p.main_image || '';
}
const isVisible = (p) => (p.status || '') === 'on_display';

function buildGroups() {
  const byId = {};
  for (const s of STORE_KEYS) {
    byId[s] = new Map();
    for (const p of (byStore[s] || [])) byId[s].set(String(p.id), p);
  }
  function localKey(p, store) {
    if (p.variation_group_id != null) return 'v' + p.variation_group_id;
    const s = baseSku(p.sku, store);
    return s ? ('s' + s) : ('p' + p.id);
  }
  const skuToKey = new Map();
  for (const p of (byStore[MAIN] || [])) {
    const s = baseSku(p.sku, MAIN);
    if (s && !skuToKey.has(s)) skuToKey.set(s, localKey(p, MAIN));
  }
  function globalKey(p, store) {
    if (store === MAIN) return localKey(p, store);
    const ext = p.external_id != null ? String(p.external_id) : '';
    if (ext) { const src = byId[MAIN].get(ext); if (src) return localKey(src, MAIN); }
    const s = baseSku(p.sku, store);
    if (s && skuToKey.has(s)) return skuToKey.get(s);
    return s ? ('s' + s) : localKey(p, store);
  }

  const map = new Map();
  for (const store of STORE_KEYS) {
    for (const p of (byStore[store] || [])) {
      const key = globalKey(p, store);
      if (!map.has(key)) map.set(key, { key: key, stores: {} });
      const g = map.get(key);
      (g.stores[store] = g.stores[store] || []).push(p);
    }
  }
  groups = Array.from(map.values());
  for (const g of groups) {
    let best = null, img = '', sku = '';
    for (const store of STORE_KEYS) {
      const arr = g.stores[store];
      if (!arr) continue;
      arr.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      for (const p of arr) {
        const n = p.name || '';
        if (best === null || n.length < best.length) best = n;
        if (!img) img = firstImage(p);
        if (!sku) sku = baseSku(p.sku, store);
      }
    }
    g.name = best || '(без названия)';
    g.base = sku || g.key;
    g.image = img;
  }
  groups.sort((a, b) => a.name.localeCompare(b.name));
}

/* ===================================================================== */
/*  Статистика и фильтр                                                   */
/* ===================================================================== */
function ageText(ts) {
  if (!ts) return '';
  const m = Math.round((Date.now() - ts) / 60000);
  if (m < 1) return 'только что';
  if (m < 60) return m + ' мин назад';
  return Math.round(m / 60) + ' ч назад';
}

function showStats() {
  const parts = STORE_KEYS.map(function (k) {
    const arr = byStore[k] || [];
    if (!arr.length) return '<span style="color:#fca5a5">' + STORES[k].title + ': нет данных</span>';
    return STORES[k].title + ': <b>' + arr.length + '</b>';
  });
  $('stats').innerHTML = '<div class="msg msg--warn">' + parts.join(' · ') +
    ' · карточек: <b>' + groups.length + '</b>' +
    (cacheAge ? ' · данные ' + ageText(cacheAge) : '') + '</div>';

  const by = {};
  for (const k of STORE_KEYS) for (const p of (byStore[k] || [])) {
    const s = p.status || '—'; by[s] = (by[s] || 0) + 1;
  }
  const sel = $('fstatus'), prev = sel.value;
  sel.innerHTML = '<option value="">Все статусы</option>' +
    Object.entries(by).sort((a, b) => b[1] - a[1])
      .map(([k, v]) => '<option value="' + escapeAttr(k) + '">' + (STATUS_RU[k] || k) + ' (' + v + ')</option>').join('');
  sel.value = Array.from(sel.options).some(o => o.value === prev) ? prev : '';
}

function debounce(fn, ms) { let t; return function () { clearTimeout(t); t = setTimeout(fn, ms); }; }
$('search').addEventListener('input', debounce(applyFilter, 250));
$('fstatus').addEventListener('change', applyFilter);

function applyFilter() {
  const q = $('search').value.trim().toLowerCase();
  const st = $('fstatus').value;
  shown = groups.filter(function (g) {
    if (st && !STORE_KEYS.some(k => (g.stores[k] || []).some(p => (p.status || '—') === st))) return false;
    if (!q) return true;
    if (g.base.toLowerCase().indexOf(q) !== -1 || g.name.toLowerCase().indexOf(q) !== -1) return true;
    return STORE_KEYS.some(k => (g.stores[k] || []).some(p =>
      (p.sku || '').toLowerCase().indexOf(q) !== -1 || (p.name || '').toLowerCase().indexOf(q) !== -1));
  });
  renderList();
}

function pickKey(store, p) { return store + ':' + p.id; }

/* какие позиции группы участвуют в выделении: главный магазин, иначе первый доступный */
function groupPickable(g) {
  const store = (g.stores[MAIN] && g.stores[MAIN].length) ? MAIN
              : STORE_KEYS.find(k => (g.stores[k] || []).length);
  if (!store) return [];
  return g.stores[store].map(p => ({ store: store, p: p }));
}

         '<span class="kid__price">' + Math.round(fin * 100) / 100 + '</span>';

function renderList() {
  const box = $('list');

      const n = (g.stores[k] || []).length;

    const kids = STORE_KEYS.map(function (k) {

      let mainIdx = 0;
      for (let i = 1; i < arr.length; i++) if (clean(arr[i].name).length < clean(arr[mainIdx].name).length) mainIdx = i;
      const mainName = clean(arr[mainIdx].name);

      const rows = arr.map(function (p, pi) {
        const key = pickKey(k, p);
        let size;

          const c = clean(p.name);

          if (size.length > 10) size = size.slice(0, 10) + '…';

            '<span class="dot ' + (isVisible(p) ? 'dot-on' : 'dot-off') + '"></span>' +

            '<span class="kid__name">' + escapeHtml(p.name || '') + '</span>' +

      return '<div class="sb"><div class="sb__t"><b>' + STORES[k].title + '</b> — ' + arr.length + ' шт.</div>' +

        '<button class="grp__btn" data-open="' + gi + '">' +

                   : '<span class="grp__img"></span>') +

/* ===================================================================== */
/*  Разновидности и пары в других магазинах                               */
/* ===================================================================== */
function siblingsOf(store, p) {
  const arr = byStore[store] || [];
  if (p.variation_group_id != null) {
    return arr.filter(x => x.id !== p.id && x.variation_group_id === p.variation_group_id);
  }
  const base = baseSku(p.sku, store);
  if (!base) return [];
  return arr.filter(x => x.id !== p.id && baseSku(x.sku, store) === base);
}

function findTwin(store, src) {
  const arr = byStore[store] || [];
  const exact = arr.find(p => p.external_id != null && String(p.external_id) === String(src.id));
  if (exact) return exact;
  const base = baseSku(src.sku, MAIN);
  const same = arr.filter(p => baseSku(p.sku, store) === base);
  if (!same.length) return null;
  if (same.length === 1) return same[0];
  const withSuf = ((src.name || '') + STORES[store].suffix).trim().toLowerCase();
  const plain = (src.name || '').trim().toLowerCase();
  return same.find(p => (p.name || '').trim().toLowerCase() === withSuf)
      || same.find(p => (p.name || '').trim().toLowerCase() === plain) || null;
}

/* ===================================================================== */
/*  Скидка                                                                */
/* ===================================================================== */
function ymd(v) {
  if (!v) return '';
  const s = String(v);
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/); if (m) return m[1] + '-' + m[2] + '-' + m[3];
  m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})/);   if (m) return m[3] + '-' + m[2] + '-' + m[1];
  return '';
}
/* Prom принимает даты только как 19.07.2026 — проверено */
function promDate(d) {
  const p = String(d || '').split('-');
  return p.length === 3 ? (p[2] + '.' + p[1] + '.' + p[0]) : '';
}
function finalPrice(price, disc) {
  if (!disc || price == null) return price;
  const v = disc.value != null ? disc.value : disc.amount;
  if (v == null) return price;
  const f = (disc.type === 'percent') ? price * (1 - v / 100) : price - v;
  return Math.max(0, Math.round(f * 100) / 100);
}

/* ===================================================================== */
/*  Применение изменений — общий механизм                                 */
/* ===================================================================== */
/*  items: [{store, product}]                                             */
/*  vals:  { price|null, discount: 'clear'|{...}|null, presence, status }  */
async function applyChanges(items, vals, msgBox) {
  const useVariants = $('opt-variants').checked;
  const useStores = $('opt-stores').checked;

  // собираем задания по магазинам
  const jobs = {};
  STORE_KEYS.forEach(k => { jobs[k] = []; });
  const seen = new Set();

  function addJob(store, prod, price) {
    const key = store + ':' + prod.id;
    if (seen.has(key)) return;
    seen.add(key);
    const o = { id: prod.id };
    if (price != null) o.price = Math.round(price * 100) / 100;
    if (vals.discount === 'clear') o.discount = null;
    else if (vals.discount && vals.discount.value) {
      if (!vals.discount.from || !vals.discount.to) throw new Error('Для скидки нужны обе даты');
      o.discount = {
        value: vals.discount.value, type: vals.discount.type,
        date_start: promDate(vals.discount.from), date_end: promDate(vals.discount.to),
      };
    }
    if (vals.presence) o.presence = vals.presence;
    if (vals.status) o.status = vals.status;
    if (Object.keys(o).length > 1) jobs[store].push({ upd: o, ref: prod });
  }

  for (const it of items) {
    const base = (vals.price != null) ? vals.price : it.product.price;
    const list = [it.product].concat(useVariants ? siblingsOf(it.store, it.product) : []);
    list.forEach(pr => addJob(it.store, pr, vals.price != null ? vals.price : null));

    if (useStores && it.store === MAIN) {
      for (const st of STORE_KEYS.filter(k => k !== MAIN)) {
        const step = stepFor(st);
        list.forEach(function (pr) {
          const twin = findTwin(st, pr);
          if (!twin) return;
          const newPrice = (vals.price != null) ? (vals.price + step) : null;
          addJob(st, twin, newPrice);
        });
      }
    }
  }

  const total = STORE_KEYS.reduce((n, k) => n + jobs[k].length, 0);
  if (!total) { showMsg(msgBox, 'warn', 'Нечего менять — не заданы значения.'); return; }

  showMsg(msgBox, 'warn', 'Отправляю ' + total + ' позиций…');
  const report = [];

  for (const store of STORE_KEYS) {
    const list = jobs[store];
    if (!list.length) continue;
    let done = 0, failed = 0;
    for (let i = 0; i < list.length; i += 100) {
      const chunk = list.slice(i, i + 100);
      try {
        const res = await api('/edit', { store: store, products: chunk.map(j => j.upd) });
        const ok = (res && (res.processed_ids || [])).map(String);
        chunk.forEach(function (j) {
          if (ok.indexOf(String(j.upd.id)) !== -1) {
            done++;
            Object.assign(j.ref, j.upd);          // обновляем у себя
          } else failed++;
        });
        const errs = res && res.errors;
        if (errs && Object.keys(errs).length) {
          report.push(STORES[store].title + ': ' + decodeMsg(JSON.stringify(errs)).slice(0, 200));
        }
      } catch (e) {
        failed += chunk.length;
        report.push(STORES[store].title + ': ' + e.message);
      }
      showMsg(msgBox, 'warn', 'Отправлено ' + (done + failed) + ' из ' + total + '…');
    }
    report.unshift(STORES[store].title + ': принято ' + done + (failed ? ', отклонено ' + failed : ''));
  }

  showMsg(msgBox, 'ok', report.map(escapeHtml).join('<br>'));
  buildGroups(); applyFilter();
  if (current) renderEditor();
}

/* ===================================================================== */
/*  Массовое применение                                                   */
/* ===================================================================== */
$('m-apply').addEventListener('click', function () { runMass(false); });
$('m-clear-disc').addEventListener('click', function () { runMass(true); });

function runMass(clearDiscount) {
  if (!picked.size) return;

  // собираем выбранные позиции
  const items = [];
  const index = {};
  for (const s of STORE_KEYS) {
    index[s] = new Map();
    for (const p of (byStore[s] || [])) index[s].set(String(p.id), p);
  }
  picked.forEach(function (key) {
    const i = key.indexOf(':');
    const store = key.slice(0, i), id = key.slice(i + 1);
    const p = index[store] && index[store].get(id);
    if (p) items.push({ store: store, product: p });
  });
  if (!items.length) return;

  const price = $('m-price').value.trim();
  const dv = $('m-disc').value.trim();

  const vals = {
    price: price === '' ? null : Number(price),
    discount: clearDiscount ? 'clear'
            : (dv === '' ? null : {
                value: Number(dv), type: $('m-disc-type').value,
                from: $('m-disc-from').value, to: $('m-disc-to').value,
              }),
    presence: $('m-presence').value,
    status: $('m-status').value,
  };

  const what = [];
  if (vals.price != null) what.push('цена ' + vals.price);
  if (clearDiscount) what.push('убрать скидку');
  else if (vals.discount) what.push('скидка ' + vals.discount.value + ($('m-disc-type').value === 'percent' ? '%' : '₴'));
  if (vals.presence) what.push('наличие');
  if (vals.status) what.push($('m-status').value === 'draft' ? 'скрыть' : 'опубликовать');
  if (!what.length) { alert('Задайте, что менять'); return; }

  const extra = [];
  if ($('opt-variants').checked) extra.push('со всеми разновидностями');
  if ($('opt-stores').checked) extra.push('и на других магазинах');

  if (!confirm('Изменить ' + items.length + ' позиций?\n\n' + what.join(', ') +
               (extra.length ? '\n' + extra.join(' ') : ''))) return;

  applyChanges(items, vals, $('stats')).catch(function (e) {
    showMsg($('stats'), 'err', escapeHtml(e.message));
  });
}
